services:
  postgres:
    image: postgres:16-alpine
    env_file:
      - .env
    environment:
      POSTGRES_USER: minibot
      POSTGRES_DB: minibot
    entrypoint:
      - /bin/sh
      - -c
      - "export POSTGRES_PASSWORD=$$(echo $$DATABASE_URL | sed 's|.*://||' | cut -d@ -f1 | cut -d: -f2-) && exec docker-entrypoint.sh postgres"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U minibot -d minibot']
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    logging:
      driver: json-file
      options:
        max-size: '10m'
        max-file: '3'

  minibot:
    build: .
    image: minibot:latest
    restart: unless-stopped
    env_file:
      - .env
    environment:
      - NODE_ENV=production
      - LOG_LEVEL=info
    depends_on:
      postgres:
        condition: service_healthy
    logging:
      driver: json-file
      options:
        max-size: '10m'
        max-file: '3'

volumes:
  postgres_data:
    driver: local
